<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2c3e50" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Attendance" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    :root {
      --primary: #2c3e50;
      --primary-hover: #1f2d3a;
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --border: #d9e2ec;
      --success: #1f9d55;
      --error: #c81e1e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 22px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: var(--primary);
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .site {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #eef2f7;
      color: var(--primary);
      font-weight: bold;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
      background: #fff;
    }

    .btn {
      display: inline-block;
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 15px 18px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
      margin-top: 12px;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: #fff;
      color: var(--primary);
      border: 1px solid var(--border);
    }

    .btn[hidden] {
      display: none !important;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid var(--border);
      text-align: left;
      font-size: 14px;
      line-height: 1.5;
    }

    .status strong {
      display: block;
      margin-bottom: 6px;
    }

    .ok {
      color: var(--success);
    }

    .bad {
      color: var(--error);
    }

    .small {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .loading {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid #dbe2ea;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Attendance v2</h1>
      <p class="subtitle">
        Register your attendance with GPS verification.
      </p>

      <div class="site" id="jobSiteBadge">Job Site: FIFA_IBC</div>

      <input id="employeeId" type="text" placeholder="Employee ID" />
      
      <select id="registerType">
        <option value="">Select register type</option>
        <option value="Clock In">Clock In</option>
        <option value="Meal In">Meal In</option>
        <option value="Meal Out">Meal Out</option>
        <option value="Clock Out">Clock Out</option>
      </select>

      <button id="submitBtn" class="btn btn-primary" type="button">
        Submit Attendance
      </button>

      <button id="installBtn" class="btn btn-secondary" type="button" hidden>
        Install App
      </button>

      <div id="status" class="status">
        <strong>Ready</strong>
        Enter Employee ID, choose register type, and tap <b>Submit Attendance</b>.
      </div>

      <div class="small">
        iPhone: use Safari and optionally <b>Agregar a inicio</b>.<br>
        Android: use Chrome and optionally <b>Install app</b>.
      </div>
    </div>
  </div>

  <script>
    // =========================
    // CONFIGURATION
    // =========================
    const jobSite = "FIFA_IBC";

    const scriptUrl = "https://script.google.com/macros/s/AKfycbztk4XuFvDk5-tlFirTu_PEF129i7BCjhz11je18i-I3YgoKVS6PeH2Ds7KtBZs0glv/exec";
    // =========================

    const employeeIdInput = document.getElementById("employeeId");
    const registerTypeInput = document.getElementById("registerType");
    const submitBtn = document.getElementById("submitBtn");
    const installBtn = document.getElementById("installBtn");
    const statusBox = document.getElementById("status");
    const jobSiteBadge = document.getElementById("jobSiteBadge");

    let deferredPrompt = null;

    jobSiteBadge.textContent = "Job Site: " + jobSite;

    function setStatus(title, message, type = "") {
      const cls = type === "error" ? "bad" : type === "success" ? "ok" : "";
      statusBox.innerHTML = `
        <strong class="${cls}">${title}</strong>
        ${message}
      `;
    }

    function setSubmitting(isSubmitting) {
      submitBtn.disabled = isSubmitting;
      submitBtn.textContent = isSubmitting ? "Submitting..." : "Submit Attendance";
    }

    function getLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("This device or browser does not support geolocation."));
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            if (
              latitude == null ||
              longitude == null ||
              isNaN(latitude) ||
              isNaN(longitude)
            ) {
              reject(new Error("GPS was not captured correctly."));
              return;
            }

            resolve({ latitude, longitude });
          },
          (error) => {
            let msg = "Could not get location.";
            if (error.code === 1) msg = "Location permission was denied.";
            if (error.code === 2) msg = "Location is unavailable.";
            if (error.code === 3) msg = "Location request timed out.";
            reject(new Error(msg));
          },
          {
            enableHighAccuracy: true,
            timeout: 25000,
            maximumAge: 0
          }
        );
      });
    }

    async function submitAttendance() {
      const employeeId = employeeIdInput.value.trim();
      const registerType = registerTypeInput.value;

      if (!employeeId) {
        setStatus("Missing data", "Please enter Employee ID.", "error");
        return;
      }

      if (!registerType) {
        setStatus("Missing data", "Please select register type.", "error");
        return;
      }

      try {
        setSubmitting(true);
        setStatus(
          "Getting location...",
          `<span class="loading"></span>Please allow GPS access if prompted.`
        );

        const loc = await getLocation();

        setStatus(
          "Sending...",
          "Saving attendance record."
        );

        const payload = {
          employeeId,
          registerType,
          jobSite,
          latitude: loc.latitude,
          longitude: loc.longitude,
          userAgent: navigator.userAgent
        };

        const response = await fetch(scriptUrl, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.success) {
          setStatus(
            "Saved",
            "Attendance registered successfully.",
            "success"
          );
          employeeIdInput.value = "";
          registerTypeInput.value = "";
        } else {
          setStatus(
            "Error",
            result.error || "Could not save attendance.",
            "error"
          );
        }
      } catch (err) {
        setStatus("Error", err.message, "error");
      } finally {
        setSubmitting(false);
      }
    }

    submitBtn.addEventListener("click", submitAttendance);

    // Android install prompt
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.hidden = false;
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) {
        setStatus(
          "Install option not available",
          "Use your browser menu and choose Install app or Add to Home screen."
        );
        return;
      }

      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.hidden = true;
    });

    window.addEventListener("appinstalled", () => {
      installBtn.hidden = true;
      setStatus(
        "App installed",
        "The app was added successfully.",
        "success"
      );
    });

    // Service worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch((err) => {
          console.log("Service worker registration failed:", err);
        });
      });
    }
  </script>
</body>
</html>
