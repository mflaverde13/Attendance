<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Check-In</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
    }
  </style>
</head>
<body>
  <h2>Getting your location...</h2>
  <p>Please allow location access to continue.</p>

  <script>
    const jobSite = "FIFA_IBC";

    const formBase =
      "https://docs.google.com/forms/d/e/1FAIpQLSf2AZWEs5ol805qQ4J10YPc9Z0FWjDYgfT4Ei8QTin_mx5PqA/viewform?usp=pp_url";

    const entryEmployeeID = "entry.1790897034";
    const entryJobSite = "entry.2092010849";
    const entryGPS = "entry.148691752";
    const entryRegisterType = "entry.2099232522";

    function goToForm(lat, lon) {
      const gps = lat + "," + lon;

      const url =
        formBase +
        "&" + entryJobSite + "=" + encodeURIComponent(jobSite) +
        "&" + entryGPS + "=" + encodeURIComponent(gps);

      window.location.href = url;
    }

    function showError(message) {
      document.body.innerHTML =
        "<h2>Unable to get location</h2><p>" + message + "</p>";
    }

    if (!navigator.geolocation) {
      showError("This device does not support geolocation.");
    } else {
      navigator.geolocation.getCurrentPosition(
        function(position) {
          goToForm(position.coords.latitude, position.coords.longitude);
        },
        function(error) {
          let msg = "Location permission is required to register attendance.";
          if (error.code === 1) msg = "Location permission was denied.";
          if (error.code === 2) msg = "Location is unavailable.";
          if (error.code === 3) msg = "Location request timed out.";
          showError(msg);
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }
  </script>
</body>
</html>
